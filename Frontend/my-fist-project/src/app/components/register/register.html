<div class="register-shell">
  <mat-card class="register-card section-card">
    <div class="register-header">
      <div class="register-icon">
        <mat-icon>person_add</mat-icon>
      </div>
      <h1>Registro de usuario</h1>
      <p>Crea tu cuenta para empezar</p>
    </div>

    <form [formGroup]="registroForm" (ngSubmit)="onSubmit()" class="register-form">
      <div class="grid">
        <mat-form-field appearance="outline">
          <mat-label>Nombre</mat-label>
          <input matInput formControlName="nombre" />
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>Apellido</mat-label>
          <input matInput formControlName="apellido" />
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>Usuario</mat-label>
          <input matInput formControlName="usuario" />
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>Correo electrónico</mat-label>
          <input matInput type="email" formControlName="correo" />
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>Contraseña</mat-label>
          <input matInput type="password" formControlName="password" />
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>Confirmar contraseña</mat-label>
          <input matInput type="password" formControlName="confirmarPassword" />
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>Dirección</mat-label>
          <input matInput formControlName="direccion" />
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>Teléfono</mat-label>
          <input matInput formControlName="telefono" />
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>Biografía</mat-label>
          <input matInput formControlName="bio" />
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>Fecha de cumpleaños</mat-label>
          <input matInput type="date" formControlName="fecha_cumpleanios" />
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>Género</mat-label>
          <input matInput formControlName="genero" />
        </mat-form-field>

        <mat-form-field appearance="outline" class="foto-field">
          <mat-label>Fotografía en base64</mat-label>
          <textarea
            matInput
            rows="5"
            formControlName="foto"
            (input)="actualizarPreviewFoto()"
          ></textarea>
        </mat-form-field>
      </div>

      <div class="preview-container" *ngIf="previewFoto">
        <img [src]="previewFoto" alt="Vista previa" class="preview-image" />
      </div>

      <div class="actions">
        <button mat-raised-button color="warn" class="register-btn" type="submit">
          Registrarme
        </button>

        <button mat-button color="primary" routerLink="/login" type="button">
          ¿Ya tienes una cuenta? Inicia sesión
        </button>
      </div>
    </form>
  </mat-card>
</div>
