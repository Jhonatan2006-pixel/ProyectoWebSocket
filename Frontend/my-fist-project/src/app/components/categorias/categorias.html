<div class="page-shell">
  <mat-toolbar class="top-toolbar">
    <button mat-icon-button routerLink="/dashboard">
      <mat-icon>arrow_back</mat-icon>
    </button>
    <span>Categorías</span>
  </mat-toolbar>

  <div class="page-content">
    <div class="two-column-layout">
      <mat-card class="section-card">
        <mat-card-header>
          <mat-card-title>{{ editando ? 'Editar categoría' : 'Agregar categoría' }}</mat-card-title>
        </mat-card-header>

        <mat-card-content class="form-grid">
          <mat-form-field appearance="outline" class="full-width">
            <mat-label>Nombre</mat-label>
            <input matInput [(ngModel)]="formulario.nombre" />
          </mat-form-field>

          <mat-form-field appearance="outline" class="full-width">
            <mat-label>Descripción</mat-label>
            <input matInput [(ngModel)]="formulario.descripcion" />
          </mat-form-field>
        </mat-card-content>

        <mat-card-actions class="card-actions">
          <button mat-raised-button color="primary" (click)="guardarCategoria()">
            <mat-icon>{{ editando ? 'save_as' : 'save' }}</mat-icon>
            {{ editando ? 'Actualizar' : 'Guardar' }}
          </button>

          <button mat-button *ngIf="editando" (click)="cancelarEdicion()">
            Cancelar
          </button>
        </mat-card-actions>
      </mat-card>

      <mat-card class="section-card table-card">
        <mat-card-header>
          <mat-card-title>Listado de categorías</mat-card-title>
        </mat-card-header>

        <mat-card-content>
          <p *ngIf="cargando">Cargando categorías...</p>
          <p *ngIf="error">{{ error }}</p>

          <div class="table-wrapper" *ngIf="!cargando && categorias.length > 0">
            <table mat-table [dataSource]="categorias" class="mat-elevation-z0 full-width">

              <ng-container matColumnDef="id">
                <th mat-header-cell *matHeaderCellDef>ID</th>
                <td mat-cell *matCellDef="let categoria">{{ categoria.id }}</td>
              </ng-container>

              <ng-container matColumnDef="nombre">
                <th mat-header-cell *matHeaderCellDef>Nombre</th>
                <td mat-cell *matCellDef="let categoria">{{ categoria.nombre }}</td>
              </ng-container>

              <ng-container matColumnDef="descripcion">
                <th mat-header-cell *matHeaderCellDef>Descripción</th>
                <td mat-cell *matCellDef="let categoria">{{ categoria.descripcion }}</td>
              </ng-container>

              <ng-container matColumnDef="acciones">
                <th mat-header-cell *matHeaderCellDef>Acciones</th>
                <td mat-cell *matCellDef="let categoria">
                  <div class="action-buttons">
                    <button mat-icon-button color="primary" (click)="editarCategoria(categoria)">
                      <mat-icon>edit</mat-icon>
                    </button>
                    <button mat-icon-button color="warn" (click)="eliminarCategoria(categoria.id)">
                      <mat-icon>delete</mat-icon>
                    </button>
                  </div>
                </td>
              </ng-container>

              <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
              <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
            </table>
          </div>

          <p *ngIf="!cargando && categorias.length === 0">No hay categorías disponibles.</p>
        </mat-card-content>
      </mat-card>
    </div>
  </div>
</div>
